name: Docker образ MCP-сервера

# Собирает многоархитектурный образ ailc как MCP-сервера (amd64 и arm64) и публикует
# его в GitHub Container Registry. Образ скачивает готовый бинарь из релиза ailc, поэтому
# тег версии образа должен соответствовать опубликованному релизу бинаря.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Версия бинаря ailc (AILC_VERSION), например 0.4.0 или latest"
        required: true
        default: "0.4.1"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ailc
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AILC_VERSION=${{ github.event.inputs.version || steps.meta.outputs.version }}
