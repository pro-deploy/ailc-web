# Развёртывание лендинга ailc. Запуск из корня репозитория ailc-web:
#   docker compose -f deploy/docker-compose.yml up -d --build
# Сайт будет доступен на http://localhost:8080
#
# MCP-сервер (../Dockerfile) намеренно НЕ описан здесь как сервис: он запускается
# не как долгоживущий демон, а по требованию редактора через stdio, и подключается
# одной строкой в конфигурации редактора (см. раздел «Подключение» на лендинге).

services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    image: ailc-web
    restart: unless-stopped
    ports:
      - "8080:80"
